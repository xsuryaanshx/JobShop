services:
  - type: web
    name: jobshop
    runtime: node
    buildCommand: npm install --no-audit --no-fund && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18.0.0
      - key: OPENROUTER_API_KEY
        sync: false
      - key: PORT
        value: 5000
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/src/.cache/ms-playwright
